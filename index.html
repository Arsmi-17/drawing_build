<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InteractiveDrawing</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- GameHub platform SDK: performs the bridge handshake and exposes window.GameHubBridge -->
    <script src="gamehub-sdk.js"></script>
    <style>
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background: #000;
        overscroll-behavior: none; -webkit-tap-highlight-color: transparent;
      }
      /* Full-bleed, overriding the stock template's fixed 960x600 + grey canvas. */
      #unity-container, .unity-desktop, .unity-mobile {
        position: fixed !important; inset: 0 !important; transform: none !important;
        width: 100% !important; height: 100% !important;
        max-width: none !important; max-height: none !important; margin: 0 !important;
      }
      #unity-canvas {
        display: block !important; width: 100% !important; height: 100% !important;
        background: #000 !important;
      }
      #unity-footer { display: none !important; }
      #unity-loading-bar {
        position: absolute; left: 50%; top: 50%;
        transform: translate(-50%, -50%); display: none;
      }
      #unity-warning {
        position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
        max-width: 90%; z-index: 10; color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityInstance = null;
      var desiredMuted = false;

      // ---- Platform bridge helpers -----------------------------------------
      function postToParent(m){ try{ if(window.parent && window.parent!==window) window.parent.postMessage(m,"*"); }catch(e){} }
      function reportProgress(p){ postToParent({ type:"gamehub:unity:progress", progress:p, ts:Date.now(), version:1 }); }
      function reportReady(){ postToParent({ type:"gamehub:unity:ready", ts:Date.now(), version:1 }); }
      function reportError(msg){ postToParent({ type:"gamehub:unity:error", error:String(msg||"Unity load failed"), ts:Date.now(), version:1 }); }

      // ---- The fix: explicitly resize the WebGL drawing buffer -------------
      // matchWebGLToCanvasSize alone is not reliable across a fullscreen
      // transition (and fullscreenchange does NOT fire inside a cross-origin
      // iframe), so we compute the viewport size and call setCanvasSize()
      // ourselves. This is what prevents the black/grey screen on enter/exit.
      function fitCanvas(){
        try{
          if(!canvas) return;
          var w = Math.max(1, Math.floor(window.innerWidth || document.documentElement.clientWidth || 1));
          var h = Math.max(1, Math.floor(window.innerHeight || document.documentElement.clientHeight || 1));
          canvas.style.width = "100%";
          canvas.style.height = "100%";
          canvas.style.display = "block";
          var dpr = Math.max(1, window.devicePixelRatio || 1);
          if(unityInstance && unityInstance.Module && typeof unityInstance.Module.setCanvasSize === "function"){
            unityInstance.Module.setCanvasSize(Math.floor(w*dpr), Math.floor(h*dpr));
          }
        }catch(e){}
      }
      // A fullscreen enter/exit settles asynchronously; keep re-fitting for
      // ~1.2s across animation frames so the buffer lands on the final size.
      function scheduleFit(){
        var start = Date.now();
        var raf = window.requestAnimationFrame || function(cb){ return setTimeout(cb, 16); };
        (function step(){ fitCanvas(); if(Date.now()-start < 1200) raf(step); })();
      }

      function applyMuted(muted){
        desiredMuted = !!muted;
        try{
          var ctx = unityInstance && unityInstance.Module && unityInstance.Module.WEBAudio && unityInstance.Module.WEBAudio.audioContext;
          if(!ctx) return;
          if(desiredMuted){ if(ctx.state==="running") ctx.suspend(); }
          else { if(ctx.state==="suspended") ctx.resume(); }
        }catch(e){}
      }

      function wirePlatformControls(){
        try{
          var bridge = window.GameHubBridge;
          if(!bridge || typeof bridge.on!=="function") return;
          bridge.on("set_mute", function(p){ applyMuted(p && p.muted); });
          // Platform tells us fullscreen changed -> refit the drawing buffer.
          bridge.on("set_fullscreen", scheduleFit);
        }catch(e){}
      }

      // Signals that actually reach a cross-origin iframe on resize/fullscreen.
      window.addEventListener("resize", fitCanvas);
      window.addEventListener("orientationchange", scheduleFit);
      document.addEventListener("fullscreenchange", scheduleFit);      // standalone / same-origin
      document.addEventListener("webkitfullscreenchange", scheduleFit);
      try{
        if(typeof ResizeObserver !== "undefined"){
          new ResizeObserver(fitCanvas).observe(document.documentElement);
        }
      }catch(e){}
      // Recover from a WebGL context loss (rapid fullscreen toggles).
      canvas.addEventListener("webglcontextlost", function(e){ try{ e.preventDefault(); }catch(_){} });
      canvas.addEventListener("webglcontextrestored", scheduleFit);

      function unityShowBanner(msg, type){
        var b = document.querySelector("#unity-warning");
        function upd(){ b.style.display = b.children.length ? "block" : "none"; }
        var div = document.createElement("div"); div.innerHTML = msg; b.appendChild(div);
        if(type=="error") div.style="background:#b91c1c;padding:10px;border-radius:8px;";
        else { if(type=="warning") div.style="background:#b45309;padding:10px;border-radius:8px;"; setTimeout(function(){ b.removeChild(div); upd(); },5000); }
        upd();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/drawing-brotli-1.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/drawing-brotli-1.data.unityweb",
        frameworkUrl: buildUrl + "/drawing-brotli-1.framework.js.unityweb",
        codeUrl: buildUrl + "/drawing-brotli-1.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "InteractiveDrawing",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        matchWebGLToCanvasSize: true,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function(){
        createUnityInstance(canvas, config, function(progress){
          document.querySelector("#unity-progress-bar-full").style.width = 100*progress + "%";
          reportProgress(progress);
        }).then(function(instance){
          unityInstance = instance;
          document.querySelector("#unity-loading-bar").style.display = "none";
          applyMuted(desiredMuted);
          wirePlatformControls();
          fitCanvas();
          scheduleFit();      // settle the initial size
          reportReady();
        }).catch(function(message){
          reportError(message);
          unityShowBanner(String(message), "error");
        });
      };
      script.onerror = function(){ reportError("Failed to load Unity loader."); unityShowBanner("Failed to load the game loader.", "error"); };
      document.body.appendChild(script);

      wirePlatformControls();
    </script>
  </body>
</html>
